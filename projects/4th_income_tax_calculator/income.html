<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income_Tax Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: black; color: white; height: 100vh; display: flex; justify-content: center; align-items: center;">
    
    <div id="parent">
        <h1>Income Tax Calculator</h1>

        <form>
            <label for="income">Enter Your Income</label>
            <input type="text" placeholder="Enter amount" name="income" id="income">
            <br><br>
            <button type="submit">Calculate Tax</button>

        </form>

        <h2>Total Tax: </h2>
    </div>

    <script src="calculate.js"></script>
</body>
</html>
