<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            width: 130px;
            height: 40px;
            font-size: 20px;
        }
        .parent{
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body style="background-color: black; display:flex;justify-content: center; align-items: center; height: 100vh; font-size: 20px;">
    
    <div id="parent">
        <button id="red" style="background-color: red;">Red</button>

        <button id="blue" style="background-color: blue;">Blue</button>

        <button id="orange" style="background-color: orange;">Orange</button>

        <button id="pink" style="background-color:pink">Pink</button>

        <button id="green" style="background-color:yellowgreen">Y Green</button>

    </div>
    <script src="color_change.js"></script>
</body>
</html>
